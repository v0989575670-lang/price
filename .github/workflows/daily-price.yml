name: Daily Price Monitor

on:
  schedule:
    - cron: '0 0 * * *'    # 08:00 Asia/Taipei
    - cron: '0 8 * * *'    # 16:00 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run price monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TZ: Asia/Taipei
        run: python -m src.main

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_number }}
          path: data/debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit updated price history
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/price_history.csv || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update price history $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')"
            git push
          fi
