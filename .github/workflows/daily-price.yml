name: Daily Price Monitor

on:
  schedule:
    - cron: '0 0 * * *'    # 08:00 Asia/Taipei
    - cron: '0 8 * * *'    # 16:00 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 完整歷史，rebase 需要

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run price monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TZ: Asia/Taipei
        run: python -m src.main

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_number }}
          path: data/debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit updated price history
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/price_history.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update price history $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')"
          # 重試 3 次，每次失敗就先 pull --rebase 再 push
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed, pulling and rebasing..."
            git pull --rebase origin main || true
            sleep 2
          done
          echo "Push failed after 3 attempts"
          exit 1
