# =============================================================================
# 多通路價格監控設定檔
# =============================================================================
# 修改後 commit & push，下次排程就會生效
# =============================================================================

# -----------------------------------------------------------------------------
# 監控商品清單
# -----------------------------------------------------------------------------
# 欄位說明：
#   name              - 完整商品名稱（顯示在 email 表格）
#   short_name        - 短名稱（用於 email 主旨）
#   search_keywords   - 用來「搜尋」的關鍵字（會組合成 "光泉 保久乳 200ml"）
#   must_include      - 結果商品名稱「全部」必須包含的字（AND）
#   must_include_any  - 結果商品名稱「至少包含一個」（OR，可選）
#   must_exclude      - 結果商品名稱絕對不能包含的字
#   pack_keywords     - 包裝關鍵字，含此字的優先（如「24入」），用於排序
# -----------------------------------------------------------------------------

products:
  - name: "光泉 成分無調整 保久乳 200ml × 24 入"
    short_name: "光泉保久乳200ml*24"
    search_keywords: ["光泉", "保久乳", "200ml"]
    must_include: ["光泉", "保久乳"]
    must_include_any: ["200ml", "200 ml", "200ML", "200cc"]
    pack_keywords: ["24入", "24瓶", "24罐", "24 入", "整箱", "箱裝"]
    must_exclude:
      - "調味"
      - "巧克力"
      - "麥芽"
      - "果汁"
      - "豆奶"
      - "低脂"
      - "高鈣"
      - "保久調味乳"
      - "草莓"
      - "香蕉"
      - "咖啡"

# -----------------------------------------------------------------------------
# 收件人清單
# -----------------------------------------------------------------------------
recipients:
  - shao087776@mail.kcdairy.com.tw
  - v0989575670@gmail.com

# -----------------------------------------------------------------------------
# 首購 / 新客優惠關鍵字
# -----------------------------------------------------------------------------
# 商品名稱或促銷標籤中含這些字，會在 email 表格紅字標記提醒
# -----------------------------------------------------------------------------
first_purchase_keywords:
  - "首購"
  - "首次"
  - "首單"
  - "新客"
  - "新會員"
  - "新人"
  - "新戶"
  - "註冊禮"
  - "首次下單"
  - "限首購"
  - "新用戶"

# -----------------------------------------------------------------------------
# 通路設定
# -----------------------------------------------------------------------------
# enabled: false 可暫時停用某通路（不會出現在 email 表格）
# -----------------------------------------------------------------------------
channels:
  - name: momo
    label: MOMO
    enabled: true
    search_url: "https://www.momoshop.com.tw/search/searchShop.jsp?keyword={query}&searchType=1&cateLevel=-1"

  - name: shopee
    label: 蝦皮
    enabled: true
    search_url: "https://shopee.tw/search?keyword={query}"

  - name: pxmart
    label: 全聯
    enabled: true
    search_url: "https://www.pxgo.com.tw/search?query={query}"

  - name: carrefour
    label: 家樂福
    enabled: true
    search_url: "https://online.carrefour.com.tw/zh/search/?text={query}"

  - name: coupang
    label: 酷澎
    enabled: true
    search_url: "https://www.tw.coupang.com/np/search?q={query}"

# -----------------------------------------------------------------------------
# 異常價格判斷
# -----------------------------------------------------------------------------
# 顯示價低於「歷史中位數 × 此比例」就會在 email 紅字標記
# -----------------------------------------------------------------------------
abnormal_price_ratio: 0.7
